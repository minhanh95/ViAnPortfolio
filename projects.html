<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <title>VAN.LAB Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./theme.js"></script>
  </head>
  <body data-page="projects">
    <header class="site-header" id="siteHeader">
      <a class="brand" id="brandHomeLink" href="./index.html">
        <p class="brand-logo">VAN.LAB</p>
      </a>
      <nav class="header-nav">
        <div class="view-toggle" role="tablist" aria-label="View mode">
          <a id="viewGalleryBtn" class="view-btn" href="./index.html" role="tab" aria-selected="false">Feature</a>
          <a id="viewIndexBtn" class="view-btn active" href="./projects.html" role="tab" aria-selected="true">Index</a>
        </div>
        <a href="./about.html" id="navMeet" class="view-btn"></a>
      </nav>
      <div class="header-utility">
        <div class="lang-toggle" role="group" aria-label="Language switcher">
          <button id="langViBtn" class="lang-btn" type="button">VI</button>
          <button id="langEnBtn" class="lang-btn" type="button">EN</button>
        </div>
        <button id="themeToggleBtn" class="theme-toggle-btn" type="button" aria-label="Switch theme"></button>
      </div>
    </header>

    <main class="main-layout">
      <section id="indexView" class="content-view reveal">
        <div class="index-wrap">
          <table class="projects-table" id="projectsTable">
            <thead>
              <tr>
                <th id="thYear"></th>
                <th id="thClient"></th>
                <th id="thType"></th>
              </tr>
            </thead>
            <tbody id="projectsTableBody"></tbody>
          </table>
          <aside id="indexPreview" class="index-preview" aria-hidden="true"></aside>
        </div>
      </section>

      <section id="caseStudyView" class="case-study hidden">
        <div class="case-panel">
          <div class="case-layout">
            <aside class="case-left-column">
              <div class="case-info-head">
                <button id="caseBackBtn" class="case-back" type="button"></button>
                <p id="caseSlideCounter" class="case-slide-counter">01/01</p>
                <button id="caseInfoToggleBtn" class="case-info-toggle" type="button"></button>
              </div>
              <h2 id="caseTitle" class="heading-display"></h2>

              <div id="caseInfoBody" class="case-info-body">
                <p id="caseType"></p>
                <p id="caseTech"></p>
                <p id="caseYear"></p>
                <p id="caseDescription" class="case-description"></p>

                <div class="case-info-bar">
                  <p><strong id="caseInfoTechLabel"></strong><span id="caseInfoTech"></span></p>
                  <p><strong id="caseInfoYearLabel"></strong><span id="caseInfoYear"></span></p>
                </div>

                <button id="nextProjectBtn" class="next-project-btn" type="button"></button>
              </div>
            </aside>

            <section class="case-right-column">
              <div class="case-slider-wrap">
                <div id="caseSlideTrack" class="case-slide-track"></div>
                <button type="button" id="caseSlidePrevBtn" class="case-slide-arrow case-slide-arrow--prev hidden"></button>
                <button type="button" id="caseSlideNextBtn" class="case-slide-arrow case-slide-arrow--next hidden"></button>
              </div>
            </section>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer site-footer--contactbar" role="contentinfo">
      <div class="site-footer__contact-row">
        <div class="site-footer__brandmark">
   
          <span class="site-footer__brandtext">@v.anlab</span>
        </div>
        <div class="site-footer__end">
          <nav class="site-footer__extnav" aria-label="Social links">
            <a class="site-footer__extlink" href="mailto:ngv.vian@gmail.com">
              <span class="site-footer__extlabel" data-footer-i18n="email">EMAIL</span>
              <span class="site-footer__extarrow" aria-hidden="true">&#8599;</span>
            </a>
            <span class="site-footer__pipe" aria-hidden="true">|</span>
            <details class="site-footer__phone-details">
              <summary class="site-footer__phone-summary">
                <span class="site-footer__extlabel" data-footer-i18n="phone">PHONE</span>
              </summary>
              <a class="site-footer__phone-number" href="tel:+84941017048">+84941017048</a>
            </details>
            <span class="site-footer__pipe" aria-hidden="true">|</span>
            <a
              class="site-footer__extlink"
              href="https://www.linkedin.com/in/vian-nguyen-3695b2195/"
              target="_blank"
              rel="noopener noreferrer"
            >
              <span class="site-footer__extlabel" data-footer-i18n="linkedin">LINKEDIN</span>
              <span class="site-footer__extarrow" aria-hidden="true">&#8599;</span>
            </a>
            <span class="site-footer__pipe" aria-hidden="true">|</span>
            <a class="site-footer__extlink" href="https://www.instagram.com/v.anlab/" target="_blank" rel="noopener noreferrer">
              <span class="site-footer__extlabel" data-footer-i18n="instagram">INSTAGRAM</span>
              <span class="site-footer__extarrow" aria-hidden="true">&#8599;</span>
            </a>
          </nav>
          <span class="site-footer__pipe site-footer__pipe--dim" aria-hidden="true">|</span>
          <time id="siteFooterYear" class="site-footer__year" datetime="2026">2026</time>
        </div>
      </div>
    </footer>

    <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
    <script src="./projects-data.js"></script>
    <script src="./portfolio.js"></script>
  </body>
</html>

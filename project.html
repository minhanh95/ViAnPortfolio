<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <title>VAN.LAB Project</title>
    <link
      rel="icon"
      type="image/png"
      href="./icon/ruler.png"
    />
    <script>
      (function applyInitialTheme() {
        const STORAGE_KEY = "vanlab-theme";
        const query = new URLSearchParams(window.location.search).get("theme");
        const fromQuery = query === "light" || query === "dark" ? query : null;
        let fromStorage = null;
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored === "light" || stored === "dark") fromStorage = stored;
        } catch (e) {
          /* ignore */
        }
        document.documentElement.dataset.theme = fromQuery || fromStorage || "dark";
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&display=optional" rel="stylesheet" />
    <link rel="preload" href="./base.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <link rel="preload" href="./project.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet" href="./base.css" />
      <link rel="stylesheet" href="./project.css" />
    </noscript>
    <script src="./theme.js"></script>
  </head>
  <body>
    <main class="project-minimal">
      <div class="project-minimal-topbar">
        <div class="project-topbar-nav">
          <a href="./index.html" class="project-back-link" id="projectBackLink">Back</a>
          <a href="./project.html" class="project-next-link" id="projectNextLink">Next project</a>
        </div>
        <div class="project-topbar-actions">
          <div class="lang-toggle" role="group" aria-label="Language switcher">
            <button id="langToggleBtn" class="lang-toggle-btn" type="button" aria-label="Switch language">EN</button>
          </div>
          <button id="themeToggleBtn" class="theme-toggle-btn" type="button" aria-label="Switch theme"></button>
          <p class="project-counter" id="projectCounter">01/01</p>
        </div>
      </div>

      <section class="project-gallery-wrap">
        <div class="project-gallery" id="projectGallery"></div>
      </section>
    </main>

    <script src="./projects-data.js"></script>
    <script src="./project.js"></script>
  </body>
</html>

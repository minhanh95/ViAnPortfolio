<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <title>VAN.LAB Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header" id="siteHeader">
      <div class="brand">
        <p class="brand-logo">VAN.LAB</p>
        <p class="brand-tagline" id="brandTagline"></p>
      </div>
      <div class="header-right">
        <nav class="header-nav">
          <div class="view-toggle" role="tablist" aria-label="View mode">
            <button id="viewGalleryBtn" class="view-btn" type="button"></button>
            <button id="viewIndexBtn" class="view-btn" type="button"></button>
          </div>
          <a href="./about.html" id="navMeet"></a>
        </nav>
        <div class="lang-toggle" role="group" aria-label="Language switcher">
          <button id="langViBtn" class="lang-btn" type="button">VI</button>
          <button id="langEnBtn" class="lang-btn" type="button">EN</button>
        </div>
      </div>
    </header>

    <main class="main-layout">
      <section id="about" class="hero-section reveal">
        <p class="section-label" id="portfolioLabel"></p>
        <h1 id="heroTitle" class="heading-display"></h1>
        <p class="hero-subtext" id="heroSubtext"></p>
      </section>

      <section id="galleryView" class="content-view reveal">
        <div id="galleryList" class="gallery-list"></div>
      </section>

      <section id="indexView" class="content-view reveal hidden">
        <div class="index-wrap">
          <table class="projects-table" id="projectsTable">
            <thead>
              <tr>
                <th id="thYear"></th>
                <th id="thClient"></th>
                <th id="thType"></th>
              </tr>
            </thead>
            <tbody id="projectsTableBody"></tbody>
          </table>
          <aside id="indexPreview" class="index-preview" aria-hidden="true"></aside>
        </div>
      </section>

      <section id="caseStudyView" class="case-study hidden">
        <div class="case-panel">
          <div class="case-layout">
            <aside class="case-left-column">
              <div class="case-info-head">
                <button id="caseBackBtn" class="case-back" type="button"></button>
                <p id="caseSlideCounter" class="case-slide-counter">01/01</p>
                <button id="caseInfoToggleBtn" class="case-info-toggle" type="button"></button>
              </div>
              <h2 id="caseTitle" class="heading-display"></h2>

              <div id="caseInfoBody" class="case-info-body">
                <p id="caseType"></p>
                <p id="caseTech"></p>
                <p id="caseYear"></p>
                <p id="caseDescription" class="case-description"></p>

                <div class="case-info-bar">
                  <p><strong id="caseInfoTechLabel"></strong><span id="caseInfoTech"></span></p>
                  <p><strong id="caseInfoYearLabel"></strong><span id="caseInfoYear"></span></p>
                </div>

                <button id="nextProjectBtn" class="next-project-btn" type="button"></button>
              </div>
            </aside>

            <section class="case-right-column">
              <div class="case-slider-wrap">
                <div id="caseSlideTrack" class="case-slide-track"></div>
                <button type="button" id="caseSlidePrevBtn" class="case-slide-arrow case-slide-arrow--prev hidden"></button>
                <button type="button" id="caseSlideNextBtn" class="case-slide-arrow case-slide-arrow--next hidden"></button>
              </div>
            </section>
          </div>
        </div>
      </section>

      <section id="meet" class="skills-showcase reveal">
        <p class="section-label" id="skillsLabel"></p>
        <div class="skills-grid">
          <article class="skill-card">
            <h3 id="softwareLabel"></h3>
            <ul id="softwareList"></ul>
          </article>
          <article class="skill-card">
            <h3 id="digitalSkillsLabel"></h3>
            <ul id="digitalSkillsList"></ul>
          </article>
          <article class="skill-card">
            <h3 id="analogSkillsLabel"></h3>
            <ul id="analogSkillsList"></ul>
          </article>
          <article class="skill-card">
            <h3 id="languagesLabel"></h3>
            <ul id="languagesList"></ul>
          </article>
        </div>
      </section>

    </main>

    <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
    <script src="./projects-data.js"></script>
    <script src="./portfolio.js"></script>
  </body>
</html>

<!doctype html>

    <link rel="stylesheet" href="./styles.css" />
    <script src="./theme.js"></script>
  </head>
  <body data-page="feature">
    <header class="site-header" id="siteHeader">
      <a class="brand" id="brandHomeLink" href="./index.html">
        <p class="brand-logo">VAN.LAB</p>
        <p class="brand-tagline" id="brandTagline"></p>
      </a>
      <nav class="header-nav">
        <div class="view-toggle" role="tablist" aria-label="View mode">
          <a id="viewGalleryBtn" class="view-btn active" href="./index.html" role="tab" aria-selected="true">Feature</a>
          <a id="viewIndexBtn" class="view-btn" href="./projects.html" role="tab" aria-selected="false">Index</a>
        </div>
        <a href="./about.html" id="navMeet" class="view-btn"></a>
      </nav>
      <div class="header-utility">
        <div class="lang-toggle" role="group" aria-label="Language switcher">
          <button id="langViBtn" class="lang-btn" type="button">VI</button>
          <button id="langEnBtn" class="lang-btn" type="button">EN</button>
        </div>
        <button id="themeToggleBtn" class="theme-toggle-btn" type="button" aria-label="Switch theme"></button>
      </div>
    </header>

    <main class="main-layout">
      <section class="location-strip" aria-label="Location and profile snapshot">
        <div class="location-strip__col location-strip__col--stack">
          <div>
            <p class="location-strip__label">Hanoi</p>
            <p id="hanoiTime" class="location-strip__time">00:00</p>
          </div>
         
        </div>
        <div class="location-strip__col location-strip__col--content">
          <p class="location-strip__label">MOTO:</p>
          <p class="location-strip__text">
            Precision in Design.<br />
            Human in Narrative.
          </p>
        </div>
        <div class="location-strip__col location-strip__col--content">
          <p class="location-strip__text">Art Director / Creative Planner / Designer</p>
        </div>
      </section>

      <section id="galleryView" class="content-view reveal">
        <div class="gallery-focus-layout">
          <div id="galleryList" class="gallery-list"></div>
          <aside id="galleryProjectInfo" class="gallery-project-info" aria-live="polite">
            <h3 id="galleryInfoTitle" class="gallery-project-title"></h3>
            <dl class="gallery-project-meta">
              <div>
                <dt id="galleryInfoYearLabel">Year</dt>
                <dd id="galleryInfoYear"></dd>
              </div>
              <div>
                <dt id="galleryInfoClientLabel">Client</dt>
                <dd id="galleryInfoClient"></dd>
              </div>
              <div>
                <dt id="galleryInfoObjectiveLabel">Objective</dt>
                <dd id="galleryInfoObjective"></dd>
              </div>
              <div>
                <dt id="galleryInfoScopeLabel">Scope of work</dt>
                <dd id="galleryInfoScope"></dd>
              </div>
            </dl>
          </aside>
        </div>
      </section>

      <section id="caseStudyView" class="case-study hidden">
        <div class="case-panel">
          <div class="case-layout">
            <aside class="case-left-column">
              <div class="case-info-head">
                <button id="caseBackBtn" class="case-back" type="button"></button>
                <p id="caseSlideCounter" class="case-slide-counter">01/01</p>
                <button id="caseInfoToggleBtn" class="case-info-toggle" type="button"></button>
              </div>
              <h2 id="caseTitle" class="heading-display"></h2>

              <div id="caseInfoBody" class="case-info-body">
                <p id="caseType"></p>
                <p id="caseTech"></p>
                <p id="caseYear"></p>
                <p id="caseDescription" class="case-description"></p>

                <div class="case-info-bar">
                  <p><strong id="caseInfoTechLabel"></strong><span id="caseInfoTech"></span></p>
                  <p><strong id="caseInfoYearLabel"></strong><span id="caseInfoYear"></span></p>
                </div>

                <button id="nextProjectBtn" class="next-project-btn" type="button"></button>
              </div>
            </aside>

            <section class="case-right-column">
              <div class="case-slider-wrap">
                <div id="caseSlideTrack" class="case-slide-track"></div>
                <button type="button" id="caseSlidePrevBtn" class="case-slide-arrow case-slide-arrow--prev hidden"></button>
                <button type="button" id="caseSlideNextBtn" class="case-slide-arrow case-slide-arrow--next hidden"></button>
              </div>
            </section>
          </div>
        </div>
      </section>
    </main>

            <a

              <span class="site-footer__extlabel" data-footer-i18n="linkedin">LINKEDIN</span>

    <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>

    <script>
      (function setupVietnamClocks() {
        const hanoiEl = document.getElementById("hanoiTime");
    
        if (!hanoiEl) return;

        const formatTime = new Intl.DateTimeFormat("en-GB", {
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
          timeZone: "Asia/Ho_Chi_Minh",
        });

        const updateClock = () => {
          const now = formatTime.format(new Date());
          hanoiEl.textContent = now;
          hcmEl.textContent = now;
        };

        updateClock();
        setInterval(updateClock, 30000);
      })();
    </script>
  </body>
</html>
